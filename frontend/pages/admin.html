<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Srividyaranya Gurukulam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900">Admin Portal</h1>
            <p class="text-slate-500 text-sm">Please sign in to access school records</p>
        </div>
        
        {% if error %}
        <div id="error-msg" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-6 border border-red-100">
            {{ error }}
        </div>
        {% endif %}

        <form action="/school-admin" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Username</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">OTP Code</label>
                <div class="flex gap-2">
                    <input type="number" name="otp" required placeholder="000000"
                           class="flex-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 transition-colors">
                    <button type="button" onclick="sendAdminOTP()" 
                            class="px-4 py-2 bg-slate-800 text-white text-[10px] font-bold rounded-lg hover:bg-slate-700 transition-colors uppercase tracking-wider">
                        Verify
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-lg mt-4">
                Login
            </button>
        </form>
    </div>

    <script>
        async function sendAdminOTP() {
            const response = await fetch("/admin-otp");
            const data = await response.json();
            alert(data.message);
        }
    </script>
</body>
</html>
